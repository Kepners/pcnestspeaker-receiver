<!DOCTYPE html>
<html>
<head>
  <title>PC Nest Speaker - Audio Receiver</title>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #334E58; overflow: hidden; }
    #status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #FCBFB7;
      font-family: 'Segoe UI', sans-serif;
      font-size: 24px;
      text-align: center;
    }
    #player { display: none; }
  </style>
</head>
<body>
  <cast-media-player id="player"></cast-media-player>
  <div id="status">Waiting for connection...</div>

  <!-- Audio elements (invisible) -->
  <audio id="webrtc-audio" autoplay></audio>
  <audio id="hls-audio" autoplay></audio>

  <script>
    const WEBRTC_NAMESPACE = 'urn:x-cast:com.pcnestspeaker.webrtc';

    // ===================
    // RTCPeerConnection capability probe (runs at script-parse time, NOT
    // inside a Cast custom-message handler, so it captures the most permissive
    // execution context the receiver runtime exposes).
    // ===================
    const RTCPC_CTOR =
      (typeof RTCPeerConnection !== 'undefined' && RTCPeerConnection) ||
      (typeof window !== 'undefined' && window.RTCPeerConnection) ||
      (typeof window !== 'undefined' && window.webkitRTCPeerConnection) ||
      (typeof globalThis !== 'undefined' && globalThis.RTCPeerConnection) ||
      null;

    const RTCPC_CAPABILITIES = {
      directRTCPeerConnection: typeof RTCPeerConnection !== 'undefined',
      windowRTCPeerConnection: typeof window !== 'undefined' && typeof window.RTCPeerConnection !== 'undefined',
      webkitRTCPeerConnection: typeof window !== 'undefined' && typeof window.webkitRTCPeerConnection !== 'undefined',
      globalThisRTCPeerConnection: typeof globalThis !== 'undefined' && typeof globalThis.RTCPeerConnection !== 'undefined',
      mediaDevices: typeof navigator !== 'undefined' && !!navigator.mediaDevices,
      userAgent: typeof navigator !== 'undefined' ? navigator.userAgent : 'unknown',
      castFrameworkVersion: (typeof cast !== 'undefined' && cast.framework && cast.framework.VERSION) || 'unknown',
      probeTimestamp: new Date().toISOString()
    };

    console.log('[Probe] RTCPC capabilities:', JSON.stringify(RTCPC_CAPABILITIES));

    // ===================
    // Cast Framework Setup
    // ===================
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();
    const playbackConfig = new cast.framework.PlaybackConfig();

    // Low latency settings
    playbackConfig.autoResumeDuration = 0;
    playbackConfig.autoPauseDuration = 0;
    playbackConfig.initialBandwidth = 100000000;
    playbackConfig.disablePreload = true;

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.PRELOAD,
      () => null
    );

    playerManager.setPlaybackConfig(playbackConfig);

    // ===================
    // WebRTC via MediaMTX WHEP
    // ===================
    let peerConnection = null;
    let whepResourceUrl = null;
    const webrtcAudio = document.getElementById('webrtc-audio');
    const hlsAudio = document.getElementById('hls-audio');
    let hlsPlayer = null;
    let currentMode = null; // 'webrtc' or 'hls'

    function log(msg) {
      console.log('[Audio] ' + msg);
      document.getElementById('status').textContent = msg;
    }

    // Retry configuration
    let retryCount = 0;
    const MAX_RETRIES = 5;
    const RETRY_DELAY = 2000;

    // ===================
    // RTT Measurement
    // ===================
    let rttMeasurementInterval = null;
    let rttSamples = [];
    const RTT_SAMPLE_COUNT = 5;
    const RTT_POLL_INTERVAL = 2000; // 2 seconds
    const BUFFER_OFFSET_MS = 160; // Pipeline: FFmpeg 50ms + Opus 20ms + Jitter 50ms + Decode 10ms + Speaker 30ms

    async function measureRTT() {
      if (!peerConnection || peerConnection.connectionState !== 'connected') {
        return null;
      }

      try {
        const stats = await peerConnection.getStats();
        for (const report of stats.values()) {
          // Look for the active ICE candidate pair
          if (report.type === 'candidate-pair' && report.state === 'succeeded') {
            if (report.currentRoundTripTime !== undefined) {
              return Math.round(report.currentRoundTripTime * 1000); // Convert to ms
            }
          }
        }
      } catch (e) {
        console.error('[RTT] getStats error:', e);
      }
      return null;
    }

    function startRTTMeasurement() {
      if (rttMeasurementInterval) return; // Already measuring

      rttSamples = [];
      console.log('[RTT] Starting measurement...');
      log('Measuring latency...');

      rttMeasurementInterval = setInterval(async () => {
        const rtt = await measureRTT();
        if (rtt !== null) {
          rttSamples.push(rtt);
          console.log('[RTT] Sample:', rtt, 'ms');

          if (rttSamples.length >= RTT_SAMPLE_COUNT) {
            // Calculate average RTT
            const avgRTT = Math.round(rttSamples.reduce((a, b) => a + b, 0) / rttSamples.length);
            // One-way latency is RTT/2, plus buffer offset
            const recommendedDelay = Math.round(avgRTT / 2) + BUFFER_OFFSET_MS;

            console.log('[RTT] Average RTT:', avgRTT, 'ms, Recommended delay:', recommendedDelay, 'ms');

            // Send result back to sender
            sendLatencyResult({
              rtt: avgRTT,
              recommendedDelay: recommendedDelay,
              samples: rttSamples.length
            });

            stopRTTMeasurement();
            log('Streaming audio...');
          }
        }
      }, RTT_POLL_INTERVAL);
    }

    function stopRTTMeasurement() {
      if (rttMeasurementInterval) {
        clearInterval(rttMeasurementInterval);
        rttMeasurementInterval = null;
      }
    }

    function sendLatencyResult(data) {
      try {
        // Send via Cast message to all connected senders
        context.sendCustomMessage(WEBRTC_NAMESPACE, undefined, {
          type: 'latency-result',
          ...data
        });
        console.log('[RTT] Sent latency result:', data);
      } catch (e) {
        console.error('[RTT] Failed to send result:', e);
      }
    }

    async function createWebRTCPeer(streamName = 'pcaudio', reconnectHandler = null) {
      log('Connecting WebRTC...');
      currentMode = 'webrtc';

      // Stop any HLS playback
      if (hlsPlayer) {
        hlsPlayer.destroy();
        hlsPlayer = null;
      }
      hlsAudio.pause();
      hlsAudio.src = '';
      whepResourceUrl = null;
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }

      const iceConfig = { iceServers: [], iceTransportPolicy: 'all' };

      if (!RTCPC_CTOR) {
        const err = new Error('No RTCPeerConnection constructor available in receiver runtime');
        err.capabilities = RTCPC_CAPABILITIES;
        throw err;
      }
      peerConnection = new RTCPC_CTOR(iceConfig);

      peerConnection.ontrack = (event) => {
        console.log('[WebRTC] Track received:', event.track.kind);
        if (event.track.kind === 'audio') {
          if (event.streams && event.streams[0]) {
            webrtcAudio.srcObject = event.streams[0];
          } else {
            webrtcAudio.srcObject = new MediaStream([event.track]);
          }
          webrtcAudio.muted = false;
          webrtcAudio.volume = 1.0;
          webrtcAudio.play().then(() => {
            log('Streaming audio...');
          }).catch(e => {
            webrtcAudio.muted = true;
            webrtcAudio.play().then(() => {
              setTimeout(() => { webrtcAudio.muted = false; }, 100);
              log('Streaming audio...');
            });
          });
        }
      };

      peerConnection.onconnectionstatechange = () => {
        const state = peerConnection.connectionState;
        console.log('[WebRTC] Connection state:', state);
        if (state === 'connected') log('Streaming audio...');
        else if (state === 'failed') {
          if (reconnectHandler) {
            log('Reconnecting...');
            setTimeout(reconnectHandler, 3000);
          } else {
            log('Connection failed');
          }
        }
      };

      peerConnection.oniceconnectionstatechange = () => {
        console.log('[WebRTC] ICE state:', peerConnection.iceConnectionState);
      };

      peerConnection.addTransceiver('audio', { direction: 'recvonly' });

      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);

      // Wait for ICE gathering
      await new Promise((resolve) => {
        if (peerConnection.iceGatheringState === 'complete') resolve();
        else {
          const check = () => {
            if (peerConnection.iceGatheringState === 'complete') {
              peerConnection.removeEventListener('icegatheringstatechange', check);
              resolve();
            }
          };
          peerConnection.addEventListener('icegatheringstatechange', check);
          setTimeout(resolve, 2000);
        }
      });

      return peerConnection.localDescription.sdp;
    }

    async function connectWebRTC(serverUrl, streamName = 'pcaudio') {
      try {
        const offerSdp = await createWebRTCPeer(streamName, () => {
          disconnect();
          connectWebRTC(serverUrl, streamName);
        });

        const whepUrl = serverUrl + '/' + streamName + '/whep';
        console.log('[WebRTC] WHEP URL:', whepUrl);

        const response = await fetch(whepUrl, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'application/sdp' },
          body: offerSdp
        });

        if (!response.ok) throw new Error('WHEP error ' + response.status);

        const location = response.headers.get('Location');
        if (location) {
          whepResourceUrl = location.startsWith('/') ? serverUrl + location : location;
        }

        const answerSdp = await response.text();
        await peerConnection.setRemoteDescription({ type: 'answer', sdp: answerSdp });
        retryCount = 0;
        console.log('[WebRTC] Connected successfully');

      } catch (e) {
        console.error('[WebRTC] Error:', e);
        // Surface the failure to PC every attempt so the stream-attempt JSON
        // captures the receiver-side error instead of silently retrying.
        try {
          context.sendCustomMessage(WEBRTC_NAMESPACE, undefined, {
            type: 'connect-error',
            stream: streamName,
            serverUrl: serverUrl,
            attempt: retryCount + 1,
            error: e && e.message ? e.message : String(e),
            errorName: e && e.name ? e.name : null,
            errorStack: e && typeof e.stack === 'string' ? e.stack.slice(0, 500) : null,
            capabilities: RTCPC_CAPABILITIES,
            rtcCtorPresent: !!RTCPC_CTOR
          });
        } catch (_) { /* ignore reporting failure */ }
        retryCount++;
        if (retryCount <= MAX_RETRIES) {
          log(`Retry ${retryCount}/${MAX_RETRIES}...`);
          if (peerConnection) { peerConnection.close(); peerConnection = null; }
          setTimeout(() => connectWebRTC(serverUrl, streamName), RETRY_DELAY);
        } else {
          log('Connection failed');
          retryCount = 0;
        }
      }
    }

    async function requestProxyOffer(streamName = 'pcaudio') {
      try {
        const offerSdp = await createWebRTCPeer(streamName);
        context.sendCustomMessage(WEBRTC_NAMESPACE, undefined, {
          type: 'offer',
          stream: streamName,
          sdp: offerSdp
        });
        console.log('[WebRTC] Sent proxied SDP offer');
      } catch (e) {
        console.error('[WebRTC] Proxy offer error:', e);
        context.sendCustomMessage(WEBRTC_NAMESPACE, undefined, {
          type: 'offer-error',
          stream: streamName,
          error: e.message,
          errorName: e.name || null,
          errorStack: typeof e.stack === 'string' ? e.stack.slice(0, 500) : null,
          capabilities: RTCPC_CAPABILITIES,
          rtcCtorPresent: !!RTCPC_CTOR
        });
        log('Connection failed');
      }
    }

    async function applyProxyAnswer(sdp) {
      if (!peerConnection) {
        console.warn('[WebRTC] No pending peer connection for proxy answer');
        return;
      }

      try {
        await peerConnection.setRemoteDescription({ type: 'answer', sdp });
        retryCount = 0;
        console.log('[WebRTC] Proxy SDP answer applied');
        log('Streaming audio...');
      } catch (e) {
        console.error('[WebRTC] Proxy answer error:', e);
        log('Connection failed');
      }
    }

    function connectHLS(hlsUrl) {
      log('Connecting HLS...');
      currentMode = 'hls';

      // Stop any WebRTC
      disconnect();

      if (Hls.isSupported()) {
        hlsPlayer = new Hls({
          enableWorker: true,
          lowLatencyMode: true,
          liveSyncDurationCount: 1,
          liveMaxLatencyDurationCount: 3,
          liveDurationInfinity: true,
          highBufferWatchdogPeriod: 1
        });

        hlsPlayer.loadSource(hlsUrl);
        hlsPlayer.attachMedia(hlsAudio);

        hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => {
          console.log('[HLS] Manifest parsed, playing...');
          hlsAudio.play().then(() => {
            log('Streaming audio...');
          }).catch(e => console.error('[HLS] Play error:', e));
        });

        hlsPlayer.on(Hls.Events.ERROR, (event, data) => {
          console.error('[HLS] Error:', data.type, data.details);
          if (data.fatal) {
            log('HLS error - retrying...');
            hlsPlayer.destroy();
            setTimeout(() => connectHLS(hlsUrl), 3000);
          }
        });
      } else if (hlsAudio.canPlayType('application/vnd.apple.mpegurl')) {
        // Native HLS support (Safari)
        hlsAudio.src = hlsUrl;
        hlsAudio.play().then(() => log('Streaming audio...')).catch(e => log('Play error'));
      } else {
        log('HLS not supported');
      }
    }

    function disconnect() {
      stopRTTMeasurement(); // Stop any ongoing measurement
      if (peerConnection) {
        if (whepResourceUrl) {
          fetch(whepResourceUrl, { method: 'DELETE' }).catch(() => {});
          whepResourceUrl = null;
        }
        peerConnection.close();
        peerConnection = null;
        webrtcAudio.srcObject = null;
      }
      if (hlsPlayer) {
        hlsPlayer.destroy();
        hlsPlayer = null;
      }
      hlsAudio.pause();
      hlsAudio.src = '';
      currentMode = null;
    }

    // Handle custom messages
    function handleMessage(event) {
      console.log('[Cast] Message:', event.data);
      const data = event.data;

      switch (data.type) {
        case 'connect':
          if (data.url) connectWebRTC(data.url, data.stream || 'pcaudio');
          break;
        case 'request_offer':
        case 'request-offer':
          requestProxyOffer(data.stream || 'pcaudio');
          break;
        case 'answer':
          if (data.sdp) applyProxyAnswer(data.sdp);
          break;
        case 'hls':
          if (data.url) connectHLS(data.url);
          break;
        case 'disconnect':
        case 'close':
          disconnect();
          log('Disconnected');
          break;
        case 'measure-latency':
          // PC requested latency measurement
          startRTTMeasurement();
          break;
      }
    }

    context.addCustomMessageListener(WEBRTC_NAMESPACE, handleMessage);

    // Intercept LOAD requests
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      (request) => {
        console.log('[Cast] LOAD request:', JSON.stringify(request, null, 2));

        if (request.media && request.media.contentId) {
          const contentId = request.media.contentId;

          // Handle webrtc:// prefix
          if (contentId.startsWith('webrtc://')) {
            const httpsUrl = contentId.replace('webrtc://', '');
            const streamName = (request.media.customData && request.media.customData.stream) || 'pcaudio';
            console.log('[Cast] WebRTC URL:', httpsUrl);
            connectWebRTC(httpsUrl, streamName);
            return null;
          }

          // Handle HLS URLs (.m3u8)
          if (contentId.includes('.m3u8')) {
            console.log('[Cast] HLS URL:', contentId);
            connectHLS(contentId);
            return null;
          }
        }

        // Check customData for WebRTC
        if (request.media && request.media.customData && request.media.customData.webrtcUrl) {
          connectWebRTC(request.media.customData.webrtcUrl, request.media.customData.stream || 'pcaudio');
          return null;
        }

        if (request.customData && request.customData.webrtcUrl) {
          connectWebRTC(request.customData.webrtcUrl, request.customData.stream || 'pcaudio');
          return null;
        }

        // Default: let Cast framework handle it
        if (request.media) {
          request.media.streamType = cast.framework.messages.StreamType.LIVE;
          request.autoplay = true;
        }
        return request;
      }
    );

    context.start({
      playbackConfig: playbackConfig,
      skipPlayersLoad: false,
      disableIdleTimeout: true,
      supportedCommands: cast.framework.messages.Command.ALL_BASIC_MEDIA,
      customNamespaces: {
        [WEBRTC_NAMESPACE]: cast.framework.system.MessageType.JSON
      }
    });

    // Send capability probe to PC once a sender is connected so the PC can log
    // what's actually available on this receiver runtime, even before any
    // stream attempt. PC side may ignore this message type if not handled.
    try {
      context.sendCustomMessage(WEBRTC_NAMESPACE, undefined, {
        type: 'capability-probe',
        capabilities: RTCPC_CAPABILITIES,
        rtcCtorPresent: !!RTCPC_CTOR
      });
    } catch (probeErr) {
      console.warn('[Probe] sendCustomMessage at startup failed:', probeErr && probeErr.message);
    }

    log('Waiting for connection...');
  </script>
</body>
</html>
